databases:
  - name: homebuyer-db
    plan: free
    databaseName: homebuyer
    postgresMajorVersion: "16"

services:
  - type: web
    name: homebuyer
    runtime: python
    plan: free
    buildCommand: ./render-build.sh
    startCommand: python -m homebuyer
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: homebuyer-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
